<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontrol Projek - Judul Center</title>
    <style>
        body { 
            background: #121212; 
            color: #D4AF37; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            padding: 10px; 
        }

        .container { 
            max-width: 900px; 
            margin: 20px auto; 
            background: #1a1a1a; 
            border: 1px solid #D4AF37; 
            border-radius: 12px; 
            padding: 25px; 
            box-shadow: 0 0 15px rgba(212,175,55,0.1);
        }

        /* BAGIAN YANG DIUBAH: Judul Rata Tengah */
        h2.main-title { 
            color: #fff; 
            text-align: center !important; /* Paksa ke tengah */
            font-size: 24px; 
            margin-bottom: 30px; 
            display: block; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* FORM INPUT - TETAP RATA KIRI */
        .form-group { 
            margin-bottom: 20px; 
            text-align: left !important; 
        }

        .form-group label { 
            display: block; 
            font-size: 14px; 
            font-weight: bold; 
            color: #D4AF37; 
            margin-bottom: 8px; 
        }

        .input-box {
            width: 100%; 
            background: #222; 
            border: 1px solid #D4AF37; 
            border-radius: 10px; 
            padding: 12px 15px; 
            color: #fff; 
            font-size: 14px; 
            box-sizing: border-box; 
            outline: none; 
            text-align: left !important; /* Isi teks tetap di kiri */
        }

        .input-box::placeholder { 
            color: #777; 
            text-align: left !important; /* Placeholder tetap di kiri */
        }

        /* TOMBOL PUTIH GADING */
        .btn-submit {
            width: 100%; 
            padding: 14px; 
            background: #fffde7; 
            color: #000; 
            font-weight: bold; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 14px; 
            text-transform: uppercase; 
            margin-top: 10px;
        }

        /* SUMMARY & TABEL */
        .summary-container { display: flex; gap: 15px; margin: 30px 0; }
        .summary-box { flex: 1; background: #222; border: 1px solid #333; border-radius: 12px; padding: 20px; text-align: center; }
        .summary-box h2 { margin: 0; color: #fff; }
        
        .table-wrapper { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { text-align: left; color: #D4AF37; padding: 10px; border-bottom: 1px solid #333; }
        td { padding: 15px 10px; color: #fff; border-bottom: 1px solid #222; text-align: left; }
    </style>
</head>
<body>

    <div class="container">
        <h2 class="main-title">🛠️ KONTROL PROJEK</h2>

        <form onsubmit="addTask(event)">
            <div class="form-group">
                <label>Nama Claim Project :</label>
                <input type="text" id="claim" class="input-box" placeholder="Masukkan Nama Anda" required>
            </div>

            <div class="form-group">
                <label>👤 Nama Klien :</label>
                <input type="text" id="klien" class="input-box" placeholder="Masukkan Nama Klien..." required>
            </div>

            <div class="form-group">
                <label>📋 Nama Tugas :</label>
                <input type="text" id="task" class="input-box" placeholder="Contoh: Desain Interior Ruang Tamu" required>
            </div>

            <div class="form-group">
                <label>🔢 Kode Projek :</label>
                <input type="text" id="kode" class="input-box" placeholder="Contoh: PRJ-2026-01">
            </div>

            <div class="form-group">
                <label>📁 Pekerjaan :</label>
                <select id="pekerjaan" class="input-box">
                    <option value="" disabled selected>Pilih Jenis Pekerjaan...</option>
                    <option>3D (Architectural)</option>
                    <option>2D</option>
                    <option>RAB</option>
                </select>
            </div>

            <div class="form-group">
                <label>📅 Deadline :</label>
                <input type="date" id="deadline" class="input-box" required>
            </div>

            <button type="submit" class="btn-submit">TAMBAHKAN KE DAFTAR</button>
        </form>

        <div class="summary-container">
            <div class="summary-box">
                <h2 id="total">0</h2><span>SEMUA</span>
            </div>
            <div class="summary-box">
                <h2 id="aktif">0</h2><span>AKTIF</span>
            </div>
            <div class="summary-box">
                <h2 id="selesai">0</h2><span>SELESAI</span>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Pekerja</th><th>Klien</th><th>Tugas</th><th>Kode</th><th>Status</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('projectData')) || [];
        function addTask(e) {
            e.preventDefault();
            data.push({
                claim: document.getElementById("claim").value,
                klien: document.getElementById("klien").value,
                task: document.getElementById("task").value,
                kode: document.getElementById("kode").value,
                status: "Pending"
            });
            localStorage.setItem('projectData', JSON.stringify(data));
            e.target.reset();
            render();
        }
        function render() {
            const tbody = document.getElementById("tableBody");
            tbody.innerHTML = "";
            data.forEach((d) => {
                tbody.innerHTML += `<tr><td>${d.claim}</td><td>${d.klien}</td><td>${d.task}</td><td>${d.kode}</td><td style="color:#ffca28">${d.status}</td></tr>`;
            });
            document.getElementById("total").innerText = data.length;
        }
        render();
    </script>
</body>
</html>
