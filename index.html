<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Projek - Mobile Optimized</title>

    <style>
        body { background:#121212; color:#D4AF37; font-family:'Segoe UI', sans-serif; padding: 10px; margin: 0; }
        .container { max-width: 950px; margin: 10px auto; border: 2px solid #D4AF37; padding: 20px; border-radius: 15px; background: #1a1a1a; box-sizing: border-box; }
        h2 { text-align: center; color: #fff; text-transform: uppercase; letter-spacing: 2px; }

        /* AUTH BOX */
        .auth-box { max-width: 350px; margin: 80px auto; padding: 25px; border: 1px solid #D4AF37; border-radius: 15px; background: #1a1a1a; text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #D4AF37; background: #222; color: #fff; box-sizing: border-box; }
        button { background: #D4AF37; color: #000; font-weight: bold; cursor: pointer; border: none; }

        /* SUMMARY BOXES */
        .summary-container { display: flex; justify-content: space-between; margin: 20px 0; gap: 10px; }
        .summary-box { background: #222; padding: 15px; border-radius: 10px; flex: 1; text-align: center; cursor: pointer; border: 2px solid transparent; }
        .summary-box.active-filter { border-color: #D4AF37; background: #333; }
        .summary-box h2 { margin: 0; color: #D4AF37; font-size: 20px; }
        .summary-box span { color: #fff; font-size: 11px; text-transform: uppercase; }

        /* TABLE STYLES (DESKTOP) */
        .table-responsive { width: 100%; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { color: #D4AF37; background: #222; padding: 12px; text-align: left; font-size: 13px; border-bottom: 2px solid #333; }
        td { padding: 12px; border-bottom: 1px solid #333; font-size: 13px; color: #fff !important; }
        .status-done { color: #00c853 !important; font-weight: bold; }
        .status-pending { color: #ffca28 !important; font-weight: bold; }

        /* KHUSUS TAMPILAN HP (MOBILE OPTIMIZATION) */
        @media screen and (max-width: 768px) {
            /* Sembunyikan Header Tabel di HP */
            thead { display: none; }
            
            /* Ubah baris tabel menjadi kartu */
            tr { 
                display: block; 
                background: #222; 
                margin-bottom: 15px; 
                border-radius: 10px; 
                padding: 10px; 
                border: 1px solid #333;
            }

            td { 
                display: flex; 
                justify-content: space-between; 
                padding: 8px 5px; 
                border-bottom: 1px solid #333;
                text-align: right;
            }

            /* Tambahkan label keterangan di sisi kiri */
            td::before {
                content: attr(data-label);
                font-weight: bold;
                color: #D4AF37;
                text-align: left;
                padding-right: 10px;
            }

            td:last-child { border-bottom: none; justify-content: center; gap: 20px; }
        }
    </style>
</head>
<body>

    <div id="authContent">
        <div class="auth-box" id="loginForm">
            <h2>Login</h2>
            <input type="text" id="userLogin" placeholder="Username">
            <input type="password" id="passLogin" placeholder="Password">
            <button onclick="login()">Masuk</button>
            <p style="color:#fff; cursor:pointer; font-size:12px;" onclick="toggleAuth()">Belum punya akun? Daftar</p>
        </div>
        <div class="auth-box" id="registerForm" style="display:none;">
            <h2>Register</h2>
            <input type="text" id="userReg" placeholder="Username Baru">
            <input type="password" id="passReg" placeholder="Password Baru">
            <button onclick="register()">Daftar</button>
            <p style="color:#fff; cursor:pointer; font-size:12px;" onclick="toggleAuth()">Sudah punya akun? Login</p>
        </div>
    </div>

    <div id="mainContent" style="display: none;">
        <div class="container">
            <h2>🛠️ Kontrol Projek</h2>

            <form onsubmit="addTask(event)">
                <input type="text" id="claim" required placeholder="Pekerja">
                <input type="text" id="klien" required placeholder="Klien">
                <input type="text" id="task" required placeholder="Tugas">
                <input type="text" id="kode" placeholder="Kode Projek">
                <select id="pekerjaan">
                    <option>3D (Architectural)</option>
                    <option>2D</option>
                    <option>RAB</option>
                </select>
                <select id="divisi">
                    <option>ESCARCH</option>
                    <option>ELIT</option>
                    <option>ETB</option>
                </select>
                <input type="date" id="deadline" required>
                <button type="submit">TAMBAH PROJEK</button>
            </form>

            <div class="summary-container">
                <div class="summary-box active-filter" id="box-all" onclick="setFilter('all')">
                    <h2 id="total">0</h2><span>Semua</span>
                </div>
                <div class="summary-box" id="box-pending" onclick="setFilter('Pending')">
                    <h2 id="aktif">0</h2><span>Aktif</span>
                </div>
                <div class="summary-box" id="box-selesai" onclick="setFilter('Selesai')">
                    <h2 id="selesai">0</h2><span>Selesai</span>
                </div>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Pekerja</th><th>Klien</th><th>Tugas</th><th>Kode</th>
                            <th>Pekerjaan</th><th>Divisi</th><th>Status</th><th>Deadline</th><th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let currentFilter = 'all';
        let data = JSON.parse(localStorage.getItem('projectData')) || [];

        function toggleAuth() {
            document.getElementById('loginForm').style.display = document.getElementById('loginForm').style.display === "none" ? "block" : "none";
            document.getElementById('registerForm').style.display = document.getElementById('registerForm').style.display === "none" ? "block" : "none";
        }

        function register() {
            const u = document.getElementById('userReg').value;
            const p = document.getElementById('passReg').value;
            if(!u || !p) return alert("Isi data!");
            let users = JSON.parse(localStorage.getItem('users')) || [];
            users.push({username: u, password: p});
            localStorage.setItem('users', JSON.stringify(users));
            alert("Berhasil!"); toggleAuth();
        }

        function login() {
            const u = document.getElementById('userLogin').value;
            const p = document.getElementById('passLogin').value;
            let users = JSON.parse(localStorage.getItem('users')) || [];
            if(users.find(user => user.username === u && user.password === p)) {
                sessionStorage.setItem('isLoggedIn', 'true');
                checkSession();
            } else { alert("Salah!"); }
        }

        function checkSession() {
            if(sessionStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('authContent').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                render();
            }
        }

        function setFilter(type) {
            currentFilter = type;
            document.querySelectorAll('.summary-box').forEach(b => b.classList.remove('active-filter'));
            document.getElementById('box-' + (type === 'all' ? 'all' : type.toLowerCase())).classList.add('active-filter');
            render();
        }

        function addTask(e) {
            e.preventDefault();
            data.push({
                claim: document.getElementById("claim").value,
                klien: document.getElementById("klien").value,
                task: document.getElementById("task").value,
                kode: document.getElementById("kode").value,
                pekerjaan: document.getElementById("pekerjaan").value,
                divisi: document.getElementById("divisi").value,
                deadline: document.getElementById("deadline").value,
                status: "Pending"
            });
            localStorage.setItem('projectData', JSON.stringify(data));
            render();
            e.target.reset();
        }

        function render() {
            const tbody = document.getElementById("tableBody");
            tbody.innerHTML = "";
            let t_aktif = 0, t_selesai = 0;

            data.forEach((d, i) => {
                if(d.status === "Pending") t_aktif++; else t_selesai++;
                if (currentFilter === 'all' || d.status === currentFilter) {
                    tbody.innerHTML += `
                        <tr>
                            <td data-label="Pekerja">${d.claim}</td>
                            <td data-label="Klien">${d.klien}</td>
                            <td data-label="Tugas">${d.task}</td>
                            <td data-label="Kode">${d.kode}</td>
                            <td data-label="Pekerjaan">${d.pekerjaan}</td>
                            <td data-label="Divisi">${d.divisi}</td>
                            <td data-label="Status" class="${d.status === 'Selesai' ? 'status-done' : 'status-pending'}">${d.status}</td>
                            <td data-label="Deadline">${d.deadline}</td>
                            <td data-label="Aksi">
                                <button onclick="done(${i})" style="width:40px;">✔</button>
                                <button onclick="hapus(${i})" style="width:40px; background:red;">×</button>
                            </td>
                        </tr>`;
                }
            });
            document.getElementById("total").innerText = data.length;
            document.getElementById("aktif").innerText = t_aktif;
            document.getElementById("selesai").innerText = t_selesai;
        }

        function done(i) { data[i].status = "Selesai"; localStorage.setItem('projectData', JSON.stringify(data)); render(); }
        function hapus(i) { if(confirm("Hapus?")) { data.splice(i, 1); localStorage.setItem('projectData', JSON.stringify(data)); render(); } }

        window.onload = checkSession;
    </script>
</body>
</html>
