<style>
    /* CSS Tambahan untuk memastikan rata kiri */
    
    /* 1. Judul tetap di tengah */
    h2 { 
        text-align: center !important; 
        width: 100%; 
        display: block;
    }

    /* 2. Semua label, input, dan select dipaksa rata kiri */
    label {
        text-align: left !important;
        display: block;
        width: 100%;
    }

    input, select {
        text-align: left !important; /* Untuk teks yang diketik */
        padding-left: 15px !important;
    }

    /* 3. Menangani teks placeholder (titik hijau di gambar Anda) agar ke kiri */
    input::placeholder {
        text-align: left !important;
    }

    /* Khusus untuk dropdown/select agar teks pilihannya di kiri */
    select {
        text-align-last: left !important;
    }

    /* Tombol tetap center secara teks agar rapi */
    button[type="submit"] {
        text-align: center !important;
    }
</style>

<form onsubmit="addTask(event)">
    <label>Nama Claim Project :</label>
    <input type="text" id="claim" placeholder="Masukkan Nama Anda" required>
    
    <label>👤 Nama Klien :</label>
    <input type="text" id="klien" placeholder="Masukkan Nama Klien..." required>
    
    <label>📋 Nama Tugas :</label>
    <input type="text" id="task" placeholder="Contoh: Desain Interior Ruang Tamu" required>
    
    <label>🔢 Kode Projek :</label>
    <input type="text" id="kode" placeholder="Contoh: PRJ-2026-01">
    
    <label>📁 Pekerjaan :</label>
    <select id="pekerjaan">
        <option value="" disabled selected>Pilih Jenis Pekerjaan...</option>
        <option>3D (Architectural)</option>
        <option>2D</option>
        <option>RAB</option>
    </select>
    
    <label>⚖️ Divisi Penanggung Jawab :</label>
    <select id="divisi">
        <option value="" disabled selected>Pilih Divisi...</option>
        <option>ESCARCH</option>
        <option>ELIT</option>
        <option>ETB</option>
    </select>
    
    <label>📅 Deadline :</label>
    <input type="date" id="deadline" required>
    
    <button type="submit">TAMBAHKAN KE DAFTAR</button>
</form>
