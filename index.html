<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manajemen Projek</title>

<style>
body { background:#121212; color:#D4AF37; font-family:'Segoe UI', sans-serif; padding:20px; }
.container { max-width:900px; margin:auto; border:2px solid #D4AF37; padding:25px; border-radius:15px; background:#1a1a1a; box-shadow:0 0 20px rgba(212,175,55,0.2); }
h2 { text-align:center; color:#fff; margin-bottom:20px; text-transform:uppercase; letter-spacing:2px; }
label { font-size:13px; color:#D4AF37; display:block; margin-top:10px; }
input, select, button { width:100%; padding:12px; margin:5px 0 15px 0; border-radius:8px; border:1px solid #D4AF37; background:#222; color:#fff; }
button { background:#D4AF37; color:#000; font-weight:bold; cursor:pointer; }
table { width:100%; border-collapse:collapse; margin-top:30px; }
th, td { padding:12px; border-bottom:1px solid #333; font-size:13px; }
th { color:#D4AF37; }
.status-done { color:#00c853; font-weight:bold; }
.status-pending { color:#ffca28; font-weight:bold; }
.summary-container { display:flex; justify-content:space-around; margin:20px 0; }
.summary-box { background:#222; padding:10px; border-radius:10px; width:100px; text-align:center; }
</style>

</head>
<body>

<div class="container">
<h2>🛠️ Kontrol Projek</h2>

<!-- FORM (TIDAK TERHUBUNG DATABASE) -->
<form onsubmit="addTask(event)">
    <label>Nama Claim Project :</label>
    <input type="text" id="claim" required>

    <label>Nama Klien:</label>
    <input type="text" id="klien" required>

    <label>Nama Tugas:</label>
    <input type="text" id="task" required>

    <label>Kode Projek:</label>
    <input type="text" id="kode">

    <label>Pekerjaan:</label>
    <select id="pekerjaan">
        <option>3D (Architectural)</option>
        <option>2D</option>
        <option>RAB</option>
    </select>

    <label>Divisi:</label>
    <select id="divisi">
        <option>ESCARCH</option>
        <option>ELIT</option>
        <option>ETB</option>
    </select>

    <label>Deadline:</label>
    <input type="date" id="deadline" required>

    <button type="submit">Tambah Projek</button>
</form>

<!-- SUMMARY -->
<div class="summary-container">
    <div class="summary-box">
        <h2 id="total">0</h2>
        <span>Semua</span>
    </div>
    <div class="summary-box">
        <h2 id="aktif">0</h2>
        <span>Aktif</span>
    </div>
    <div class="summary-box">
        <h2 id="selesai">0</h2>
        <span>Selesai</span>
    </div>
</div>

<!-- TABEL -->
<table>
<thead>
<tr>
<th>Pekerja</th>
<th>Klien</th>
<th>Tugas</th>
<th>Kode</th>
<th>Pekerjaan</th>
<th>Divisi</th>
<th>Status</th>
<th>Deadline</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tableBody">
</tbody>

</table>

</div>

<script>
let data = [];

function addTask(e){
    e.preventDefault();

    let task = {
        claim: document.getElementById("claim").value,
        klien: document.getElementById("klien").value,
        task: document.getElementById("task").value,
        kode: document.getElementById("kode").value,
        pekerjaan: document.getElementById("pekerjaan").value,
        divisi: document.getElementById("divisi").value,
        deadline: document.getElementById("deadline").value,
        status: "Pending"
    };

    data.push(task);
    render();
}

function render(){
    let tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    let aktif = 0;
    let selesai = 0;

    data.forEach((d,i)=>{
        if(d.status=="Pending") aktif++;
        else selesai++;

        tbody.innerHTML += `
        <tr>
            <td>${d.claim}</td>
            <td>${d.klien}</td>
            <td>${d.task}</td>
            <td>${d.kode}</td>
            <td>${d.pekerjaan}</td>
            <td>${d.divisi}</td>
            <td class="${d.status=='Selesai'?'status-done':'status-pending'}">${d.status}</td>
            <td>${d.deadline}</td>
            <td>
                <button onclick="done(${i})">✔</button>
                <button onclick="hapus(${i})">×</button>
            </td>
        </tr>
        `;
    });

    document.getElementById("total").innerText = data.length;
    document.getElementById("aktif").innerText = aktif;
    document.getElementById("selesai").innerText = selesai;
}

function done(i){
    data[i].status = "Selesai";
    render();
}

function hapus(i){
    data.splice(i,1);
    render();
}
</script>

</body>
</html>
