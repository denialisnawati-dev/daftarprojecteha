<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontrol Projek - Fixed Layout</title>
    <style>
        body { 
            background: #121212; 
            color: #D4AF37; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            padding: 20px;
        }

        /* BOX KUNING UTAMA - Semua konten ada di dalam sini */
        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
            background: #1a1a1a; 
            border: 2px solid #D4AF37; /* Garis kotak kuning */
            border-radius: 15px; 
            padding: 30px; 
            box-shadow: 0 0 20px rgba(212,175,55,0.15);
            box-sizing: border-box;
        }

        /* Judul Rata Tengah */
        h2.main-title { 
            color: #fff; 
            text-align: center !important; 
            font-size: 24px; 
            margin-bottom: 30px; 
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        /* Form Layout */
        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 600px; /* Form tetap ramping di tengah */
            margin: 0 auto 30px auto;
        }

        .form-group { text-align: left !important; }
        .form-group label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 8px; }

        .input-box {
            width: 100%; 
            background: #222; 
            border: 1px solid #D4AF37; 
            border-radius: 10px; 
            padding: 12px 15px; 
            color: #fff; 
            font-size: 14px; 
            box-sizing: border-box; 
            text-align: left !important;
        }

        .input-box::placeholder { text-align: left !important; color: #777; }

        /* Tombol Tambah */
        .btn-submit {
            width: 100%; 
            padding: 15px; 
            background: #fffde7; 
            color: #000; 
            font-weight: bold; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            text-transform: uppercase;
            margin-top: 10px;
        }

        /* Summary Boxes di dalam kotak kuning */
        .summary-container { 
            display: flex; 
            gap: 15px; 
            margin: 30px 0;
            justify-content: center;
        }
        .summary-box { 
            flex: 1; 
            background: #222; 
            border: 1px solid #333; 
            border-radius: 12px; 
            padding: 20px; 
            text-align: center;
            min-width: 100px;
        }
        .summary-box h2 { margin: 0; font-size: 28px; color: #fff; }
        .summary-box span { font-size: 12px; font-weight: bold; }

        /* Tabel di dalam kotak kuning */
        .table-wrapper { 
            width: 100%; 
            overflow-x: auto; 
            margin-top: 20px;
            border-top: 1px solid #333;
            padding-top: 20px;
        }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { text-align: left; color: #D4AF37; padding: 12px; border-bottom: 2px solid #333; font-size: 13px; }
        td { padding: 15px 12px; color: #fff; border-bottom: 1px solid #222; text-align: left !important; }

    </style>
</head>
<body>

    <div class="container">
        <h2 class="main-title">🛠️ KONTROL PROJEK</h2>

        <form onsubmit="addTask(event)" class="form-grid">
            <div class="form-group">
                <label>Nama Claim Project :</label>
                <input type="text" id="claim" class="input-box" placeholder="Masukkan Nama Anda" required>
            </div>

            <div class="form-group">
                <label>👤 Nama Klien :</label>
                <input type="text" id="klien" class="input-box" placeholder="Masukkan Nama Klien..." required>
            </div>

            <div class="form-group">
                <label>📋 Nama Tugas :</label>
                <input type="text" id="task" class="input-box" placeholder="Contoh: Desain Interior Ruang Tamu" required>
            </div>

            <div class="form-group">
                <label>🔢 Kode Projek :</label>
                <input type="text" id="kode" class="input-box" placeholder="Contoh: PRJ-2026-01">
            </div>

            <button type="submit" class="btn-submit">TAMBAHKAN KE DAFTAR</button>
        </form>

        <div class="summary-container">
            <div class="summary-box">
                <h2 id="total">0</h2><span>SEMUA</span>
            </div>
            <div class="summary-box">
                <h2 id="aktif">0</h2><span>AKTIF</span>
            </div>
            <div class="summary-box">
                <h2 id="selesai">0</h2><span>SELESAI</span>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Pekerja</th><th>Klien</th><th>Tugas</th><th>Kode</th><th>Status</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('projectData')) || [];

        function addTask(e) {
            e.preventDefault();
            data.push({
                claim: document.getElementById("claim").value,
                klien: document.getElementById("klien").value,
                task: document.getElementById("task").value,
                kode: document.getElementById("kode").value,
                status: "Pending"
            });
            localStorage.setItem('projectData', JSON.stringify(data));
            e.target.reset();
            render();
        }

        function render() {
            const tbody = document.getElementById("tableBody");
            tbody.innerHTML = "";
            data.forEach((d) => {
                tbody.innerHTML += `<tr><td>${d.claim}</td><td>${d.klien}</td><td>${d.task}</td><td>${d.kode}</td><td style="color:#ffca28">${d.status}</td></tr>`;
            });
            document.getElementById("total").innerText = data.length;
        }
        render();
    </script>
</body>
</html>
