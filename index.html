<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manajemen Projek</title>

<style>
    body { background:#121212; color:#D4AF37; font-family:'Segoe UI', sans-serif; padding:20px; }
    .container { max-width:950px; margin:auto; border:2px solid #D4AF37; padding:25px; border-radius:15px; background:#1a1a1a; box-shadow:0 0 20px rgba(212,175,55,0.2); }
    
    /* JUDUL DI TENGAH */
    h2 { text-align:center !important; color:#fff; margin-bottom:20px; text-transform:uppercase; letter-spacing:2px; }
    
    /* FORM & INPUT RATA KIRI */
    form { text-align: left !important; }
    label { display: block; margin-top: 15px; font-weight: bold; font-size: 13px; text-align: left !important; }
    input, select { 
        width:100%; padding:12px; margin:5px 0 10px 0; border-radius:8px; border:1px solid #D4AF37; 
        background:#222; color:#fff; box-sizing: border-box; text-align: left !important; 
    }
    input::placeholder { text-align: left !important; color: #777; }
    select { text-align-last: left !important; }

    button.btn-add { 
        width: 100%; background:#D4AF37; color:#000; font-weight:bold; cursor:pointer; 
        padding: 15px; border: none; margin-top: 10px; text-transform: uppercase; border-radius: 8px; 
    }

    /* SUMMARY BOXES (BISA DIKLIK) */
    .summary-container { display:flex; justify-content:space-around; margin:30px 0; gap: 15px; }
    .summary-box { 
        background:#222; padding:20px; border-radius:10px; width:100%; 
        text-align:center; border: 2px solid transparent; cursor: pointer !important; transition: 0.3s;
    }
    .summary-box:hover { background: #333; border-color: #D4AF37; }
    .summary-box.active-filter { border-color: #D4AF37 !important; background: #2a2a2a; }
    .summary-box h2 { margin: 0; color: #D4AF37; font-size: 28px; pointer-events: none; }
    .summary-box span { color: #fff; font-size: 14px; pointer-events: none; }

    /* TABEL & AKSI */
    .table-wrapper { width:100%; overflow-x:auto; margin-top:20px; }
    table { width:100%; border-collapse:collapse; min-width: 1000px; }
    th, td { padding:12px; border-bottom:1px solid #333; font-size:12px; text-align: left !important; }
    th { color:#D4AF37; text-transform: uppercase; }
    td { color: #ffffff !important; }
    
    .status-pending { color:#ffca28 !important; font-weight:bold; }
    .status-done { color:#00c853 !important; font-weight:bold; }

    /* TOMBOL AKSI */
    .btn-done { background: #00c853; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; font-weight: bold; }
    .btn-delete { background: #ff4444; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; font-weight: bold; margin-left: 5px; }

    /* AUTH */
    .auth-box { max-width: 400px; margin: 100px auto; padding: 30px; border: 1px solid #D4AF37; border-radius: 15px; background: #1a1a1a; text-align: center; }
    #mainContent { display: none; }
</style>
</head>
<body>

<div id="authContent">
    <div class="auth-box">
        <h2>LOGIN</h2>
        <input type="text" id="userLogin" placeholder="Username">
        <input type="password" id="passLogin" placeholder="Password">
        <button class="btn-add" onclick="login()">MASUK</button>
    </div>
</div>

<div id="mainContent">
    <div class="container">
        <h2>🛠️ Kontrol Projek</h2>

        <form id="projectForm" onsubmit="addTask(event)">
            <label>Nama Claim Project :</label>
            <input type="text" id="claim" placeholder="Masukkan Nama Anda" required>
            <label>👤 Nama Klien :</label>
            <input type="text" id="klien" placeholder="Masukkan Nama Klien..." required>
            <label>📋 Nama Tugas :</label>
            <input type="text" id="task" placeholder="Contoh: Desain Interior Ruang Tamu" required>
            <label>🔢 Kode Projek :</label>
            <input type="text" id="kode" placeholder="Contoh: PRJ-2026-01">
            <label>📁 Pekerjaan :</label>
            <select id="pekerjaan" required>
                <option value="" disabled selected>Pilih Jenis Pekerjaan...</option>
                <option>3D (Architectural)</option>
                <option>2D</option>
                <option>RAB</option>
            </select>
            <label>⚖️ Divisi :</label>
            <select id="divisi" required>
                <option value="" disabled selected>Pilih Divisi...</option>
                <option>ESCARCH</option>
                <option>ELIT</option>
                <option>ETB</option>
            </select>
            <label>📅 Deadline :</label>
            <input type="date" id="deadline" required>
            <button type="submit" class="btn-add">TAMBAHKAN KE DAFTAR</button>
        </form>

        <div class="summary-container">
            <div class="summary-box active-filter" id="box-all" onclick="setFilter('all')">
                <h2 id="total">0</h2><span>Semua</span>
            </div>
            <div class="summary-box" id="box-pending" onclick="setFilter('Pending')">
                <h2 id="aktif">0</h2><span>Aktif</span>
            </div>
            <div class="summary-box" id="box-selesai" onclick="setFilter('Selesai')">
                <h2 id="selesai">0</h2><span>Selesai</span>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Pekerja</th><th>Klien</th><th>Tugas</th><th>Kode</th>
                        <th>Pekerjaan</th><th>Divisi</th><th>Status</th><th>Deadline</th><th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
let currentFilter = 'all'; 
let data = JSON.parse(localStorage.getItem('projectData')) || [];

function login() {
    sessionStorage.setItem('isLoggedIn', 'true');
    checkSession();
}

function checkSession() {
    if(sessionStorage.getItem('isLoggedIn') === 'true') {
        document.getElementById('authContent').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        render(); 
    }
}

// FUNGSI FILTER YANG SUDAH DIPERBAIKI
function setFilter(f) {
    currentFilter = f;
    document.getElementById('box-all').classList.remove('active-filter');
    document.getElementById('box-pending').classList.remove('active-filter');
    document.getElementById('box-selesai').classList.remove('active-filter');
    
    if(f === 'all') document.getElementById('box-all').classList.add('active-filter');
    else if(f === 'Pending') document.getElementById('box-pending').classList.add('active-filter');
    else if(f === 'Selesai') document.getElementById('box-selesai').classList.add('active-filter');
    
    render();
}

function addTask(e){
    e.preventDefault();
    const newTask = {
        claim: document.getElementById("claim").value,
        klien: document.getElementById("klien").value,
        task: document.getElementById("task").value,
        kode: document.getElementById("kode").value,
        pekerjaan: document.getElementById("pekerjaan").value,
        divisi: document.getElementById("divisi").value,
        deadline: document.getElementById("deadline").value,
        status: "Pending"
    };
    data.push(newTask);
    save();
    e.target.reset();
}

function save() {
    localStorage.setItem('projectData', JSON.stringify(data));
    render();
}

// RENDER TABEL DENGAN KOLOM AKSI
function render(){
    let tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";
    let t_semua = data.length, t_aktif = 0, t_selesai = 0;
    
    data.forEach((d, i) => {
        if(d.status === "Pending") t_aktif++; else t_selesai++;
        
        if (currentFilter === 'all' || d.status === currentFilter) {
            tbody.innerHTML += `
            <tr>
                <td>${d.claim}</td><td>${d.klien}</td><td>${d.task}</td><td>${d.kode}</td>
                <td>${d.pekerjaan}</td><td>${d.divisi}</td>
                <td class="${d.status=='Selesai'?'status-done':'status-pending'}">${d.status}</td>
                <td>${d.deadline}</td>
                <td>
                    ${d.status === 'Pending' ? `<button class="btn-done" onclick="markDone(${i})">✔</button>` : ''}
                    <button class="btn-delete" onclick="deleteTask(${i})">❌</button>
                </td>
            </tr>`;
        }
    });
    
    document.getElementById("total").innerText = t_semua;
    document.getElementById("aktif").innerText = t_aktif;
    document.getElementById("selesai").innerText = t_selesai;
}

function markDone(i){
    data[i].status = "Selesai";
    save();
}

function deleteTask(i){
    if(confirm("Hapus data ini?")) {
        data.splice(i, 1);
        save();
    }
}

window.onload = checkSession;
</script>
</body>
</html>
