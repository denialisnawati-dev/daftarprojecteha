<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontrol Projek - Luxury Theme</title>
    <style>
        body { background: #121212; color: #D4AF37; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 10px; }

        .container { 
            max-width: 900px; margin: 20px auto; background: #1a1a1a; 
            border: 1px solid #D4AF37; border-radius: 12px; padding: 25px; 
            box-shadow: 0 0 15px rgba(212,175,55,0.1);
        }

        h2.main-title { 
            color: #fff; text-align: left; font-size: 22px; margin-bottom: 30px; 
            display: flex; align-items: center; gap: 10px; text-transform: uppercase;
        }

        /* FORM INPUT RATA KIRI */
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 14px; font-weight: bold; color: #D4AF37; margin-bottom: 8px; }

        .input-box {
            width: 100%; background: #222; border: 1px solid #D4AF37; 
            border-radius: 10px; padding: 12px 15px; color: #fff; 
            font-size: 14px; box-sizing: border-box; outline: none; text-align: left;
        }

        .input-box::placeholder { color: #777; text-align: left; }

        /* TOMBOL PUTIH GADING SESUAI FOTO */
        .btn-submit {
            width: 100%; padding: 14px; background: #fffde7; color: #000; 
            font-weight: bold; border: none; border-radius: 10px; 
            cursor: pointer; font-size: 14px; text-transform: uppercase; 
            margin-top: 10px; transition: 0.3s; text-align: center;
        }
        .btn-submit:hover { background: #D4AF37; }

        /* SUMMARY BOXES */
        .summary-container { display: flex; gap: 15px; margin: 30px 0; }
        .summary-box { 
            flex: 1; background: #222; border: 1px solid #333; 
            border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; 
        }
        .summary-box.active { border-color: #D4AF37; }
        .summary-box h2 { margin: 0; font-size: 28px; color: #fff; }
        .summary-box span { color: #D4AF37; font-size: 12px; font-weight: bold; text-transform: uppercase; }

        /* TABLE AREA */
        .table-wrapper { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 800px; }
        th { text-align: left; font-size: 12px; color: #D4AF37; padding: 10px; border-bottom: 1px solid #333; }
        td { padding: 15px 10px; color: #fff; font-size: 13px; border-bottom: 1px solid #222; text-align: left; }

        /* MOBILE CARD VIEW */
        @media screen and (max-width: 768px) {
            thead { display: none; }
            tr { display: block; background: #222; margin-bottom: 15px; border-radius: 10px; padding: 10px; border: 1px solid #333; }
            td { display: flex; justify-content: space-between; padding: 8px 5px; border-bottom: 1px solid #333; text-align: right; }
            td::before { content: attr(data-label); color: #D4AF37; font-weight: bold; text-align: left; }
            td:last-child { border: none; justify-content: center; gap: 20px; }
        }
    </style>
</head>
<body>

    <div id="authContent">
        <div class="container" style="max-width: 400px; margin-top: 100px; text-align: center;">
            <h2 style="color:#fff">LOGIN</h2>
            <input type="text" id="userLogin" placeholder="Username" class="input-box" style="margin-bottom:15px">
            <input type="password" id="passLogin" placeholder="Password" class="input-box" style="margin-bottom:15px">
            <button onclick="login()" class="btn-submit">MASUK</button>
        </div>
    </div>

    <div id="mainContent" style="display: none;">
        <div class="container">
            <h2 class="main-title">🛠️ KONTROL PROJEK</h2>

            <form onsubmit="addTask(event)">
                <div class="form-group">
                    <label>Nama Claim Project :</label>
                    <input type="text" id="claim" class="input-box" placeholder="Masukkan Nama Anda" required>
                </div>

                <div class="form-group">
                    <label>👤 Nama Klien :</label>
                    <input type="text" id="klien" class="input-box" placeholder="Masukkan Nama Klien..." required>
                </div>

                <div class="form-group">
                    <label>📋 Nama Tugas :</label>
                    <input type="text" id="task" class="input-box" placeholder="Contoh: Desain Interior Ruang Tamu" required>
                </div>

                <div class="form-group">
                    <label>🔢 Kode Projek :</label>
                    <input type="text" id="kode" class="input-box" placeholder="Contoh: PRJ-2026-01">
                </div>

                <div class="form-group">
                    <label>📁 Pekerjaan :</label>
                    <select id="pekerjaan" class="input-box">
                        <option value="" disabled selected>Pilih Jenis Pekerjaan...</option>
                        <option>3D (Architectural)</option>
                        <option>2D</option>
                        <option>RAB</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>⚖️ Divisi Penanggung Jawab :</label>
                    <select id="divisi" class="input-box">
                        <option value="" disabled selected>Pilih Divisi...</option>
                        <option>ESCARCH</option>
                        <option>ELIT</option>
                        <option>ETB</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>📅 Deadline :</label>
                    <input type="date" id="deadline" class="input-box" required>
                </div>

                <button type="submit" class="btn-submit">TAMBAHKAN KE DAFTAR</button>
            </form>

            <div class="summary-container">
                <div class="summary-box active" onclick="setFilter('all')" id="box-all">
                    <h2 id="total">0</h2><span>SEMUA</span>
                </div>
                <div class="summary-box" onclick="setFilter('Pending')" id="box-pending">
                    <h2 id="aktif">0</h2><span>AKTIF</span>
                </div>
                <div class="summary-box" onclick="setFilter('Selesai')" id="box-selesai">
                    <h2 id="selesai">0</h2><span>SELESAI</span>
                </div>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Pekerja</th><th>Klien</th><th>Tugas</th><th>Kode</th>
                            <th>Pekerjaan</th><th>Divisi</th><th>Status</th><th>Deadline</th><th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('projectData')) || [];
        let currentFilter = 'all';

        function login() {
            if(document.getElementById('userLogin').value !== "") {
                sessionStorage.setItem('isLoggedIn', 'true');
                checkSession();
            }
        }

        function checkSession() {
            if(sessionStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('authContent').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                render();
            }
        }

        function addTask(e) {
            e.preventDefault();
            data.push({
                claim: document.getElementById("claim").value,
                klien: document.getElementById("klien").value,
                task: document.getElementById("task").value,
                kode: document.getElementById("kode").value,
                pekerjaan: document.getElementById("pekerjaan").value,
                divisi: document.getElementById("divisi").value,
                deadline: document.getElementById("deadline").value,
                status: "Pending"
            });
            localStorage.setItem('projectData', JSON.stringify(data));
            e.target.reset();
            render();
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.summary-box').forEach(b => b.classList.remove('active'));
            document.getElementById('box-' + (f === 'all' ? 'all' : f.toLowerCase())).classList.add('active');
            render();
        }

        function render() {
            const tbody = document.getElementById("tableBody");
            tbody.innerHTML = "";
            let t_aktif = 0, t_selesai = 0;

            data.forEach((d, i) => {
                if(d.status === "Pending") t_aktif++; else t_selesai++;
                if(currentFilter === 'all' || d.status === currentFilter) {
                    tbody.innerHTML += `
                        <tr>
                            <td data-label="Pekerja">${d.claim}</td>
                            <td data-label="Klien">${d.klien}</td>
                            <td data-label="Tugas">${d.task}</td>
                            <td data-label="Kode">${d.kode}</td>
                            <td data-label="Pekerjaan">${d.pekerjaan}</td>
                            <td data-label="Divisi">${d.divisi}</td>
                            <td data-label="Status" style="color:${d.status === 'Selesai' ? '#00c853' : '#ffca28'}">${d.status}</td>
                            <td data-label="Deadline">${d.deadline}</td>
                            <td data-label="Aksi">
                                <button onclick="markDone(${i})" style="cursor:pointer; background:#D4AF37; border:none; border-radius:4px; padding:2px 8px;">✔</button>
                                <button onclick="hapus(${i})" style="cursor:pointer; background:#ff4444; color:white; border:none; border-radius:4px; padding:2px 8px;">×</button>
                            </td>
                        </tr>`;
                }
            });

            document.getElementById("total").innerText = data.length;
            document.getElementById("aktif").innerText = t_aktif;
            document.getElementById("selesai").innerText = t_selesai;
        }

        function markDone(i) { data[i].status = "Selesai"; localStorage.setItem('projectData', JSON.stringify(data)); render(); }
        function hapus(i) { if(confirm("Hapus?")) { data.splice(i, 1); localStorage.setItem('projectData', JSON.stringify(data)); render(); } }

        window.onload = checkSession;
    </script>
</body>
</html>
